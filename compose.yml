services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=secret
      - DB_NAME=hw_advisor
      # Proměnné OPENAI_API_KEY se doplní automaticky na dashboardu portálu kurim dle pokynů
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=hw_advisor
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
